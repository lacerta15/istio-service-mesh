apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-internal-only
  namespace: app-namespace
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/app-namespace/sa/*"]
      to:
        - operation:
            methods: ["GET", "POST"]
